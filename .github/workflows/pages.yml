name: Deploy site to GitHub Pages

# Publishes the site/ folder to the gh-pages branch, which GitHub Pages serves.
# This branch method is more reliable for a fresh repo than the Actions-artifact
# flow. Live at: https://phun333.github.io/ShareClick/
on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish site/ to gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp -r site "$RUNNER_TEMP/site"
          cd "$RUNNER_TEMP/site"
          touch .nojekyll            # skip Jekyll, serve files as-is
          git init -q -b gh-pages
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -qm "deploy site @ ${GITHUB_SHA::7}"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages:gh-pages
